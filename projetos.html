<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portifolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Skranji:wght@400;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: rgb(244, 244, 249);
            background-attachment: fixed;
            background-size: cover;
        }

        .titulo {
            font-family: "Skranji", system-ui;
            font-weight: 400;
            font-style: normal;
            color: rgb(255, 140, 0);
            font-size: 25px;
        }

        .barrinha {
            background-image: linear-gradient(to right, rgb(0, 15, 103), rgb(53, 4, 189));
            color: white;
            display: flex;  
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
        }

        .links {
            list-style: none;
            font-size: 20px;
            display: flex;
            margin: 0;
            padding: 0;
        }

        .links li {
            margin-left: 20px;
        }

        .links a {
            color: rgb(255, 140, 0);
            font-family: "Skranji", system-ui;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
        }

        .links a:hover {
            color: rgb(255, 217, 170);
            transform: scale(1.1);
        }
        h5{
            font-family: "Roboto", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
            font-variation-settings: "wdth" 100;
            margin:10px;
            margin-left: 50px;
            margin-bottom:40px;
            padding: 5px;
            max-width: 85ch;
        }
        p{
            font-family: "Roboto", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
            font-variation-settings: "wdth" 100;
            margin:10px;
            margin-left: 50px;
        }
        .bemvindo{
            font-family: "Skranji", system-ui;
            font-weight: 400;
            font-style: normal;
            color: rgb(51, 51, 51);
            font-size: 25px;
            text-align: center;
        }
        
        .projetos{
            margin-top: 10px;
            margin-right: 10px;
            margin-left:10px;
            display:flex;
            gap: 50px;
            justify-content: space-around;
            align-items: center;
            padding:40px;

        }

        .nome-projetos p{
            font-family: "Skranji", system-ui;
            font-weight: 400;
            font-style: normal;
            color: rgb(51, 51, 51);
            font-size: 35px;
            flex:1;
            text-align: center;
        }
    </style>
</head>

<body>
    <header class="barrinha">
        <div class="titulo">PORTIFÓLIO DO MR. COMÉDIA</div>
        <nav>
            <ul class="links">
                <li><a href="index.html">Pág. inicial</a></li>  
                <li><a href="projetos.html">Projetos</a></li>
            </ul>
        </nav>
    </header>

    <p class="bemvindo">Meus Projetos (até então): </p>
    
    <div class="nome-projetos">
        <p>Portifólio</p>
    </div> 
    <ul class="projetos">
        <li><a href="https://mrbuenoifpr.github.io/portifolio/" target="_blank"><img src="portifolio.png" alt="portifólio" ></a></li>
    </ul>

</body>

</html>
