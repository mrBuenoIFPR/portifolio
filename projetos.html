<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Portifolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Skranji:wght@400;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: rgb(244, 244, 249);
            background-attachment: fixed;
            background-size: cover;
        }

        .titulo {
            font-family: "Skranji", system-ui;
            font-weight: 400;
            font-style: normal;
            color: rgb(255, 140, 0);
            font-size: 25px;
        }

        .barrinha {
            background-image: linear-gradient(to right, rgb(0, 15, 103), rgb(53, 4, 189));
            color: white;
            display: flex;  
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
        }

        .links {
            list-style: none;
            font-size: 20px;
            display: flex;
            margin: 0;
            padding: 0;
        }

        .links li {
            margin-left: 20px;
        }

        .links a {
            color: rgb(255, 140, 0);
            font-family: "Skranji", system-ui;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
        }

        .links a:hover {
            color: rgb(255, 217, 170);
            transform: scale(1.1);
        }

        .bemvindo {
            font-family: "Skranji", system-ui;
            font-weight: 400;
            font-style: normal;
            color: rgb(51, 51, 51);
            font-size: 25px;
            text-align: center;
            margin-top: 30px;
        }

        .projetos {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            margin: 0;
            list-style: none;
        }

        .caixa {
            padding: 16px;
            background-image: linear-gradient(to bottom right, rgb(230, 230, 235), rgb(200, 200, 205));
            box-shadow: 7px 7px 15px 1px rgba(86, 86, 86, 0.50);
            border-radius: 5px;
            text-align: center;
        }

        .caixa a {
            text-decoration: none;
        }

        .caixa img {
            display: block;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .nome-projetos p {
            font-family: "Skranji", system-ui;
            font-weight: 400;
            font-style: normal;
            color: rgb(51, 51, 51);
            font-size: 22px;
            margin: 0;
        }
    </style>
</head>

<body>
    <header class="barrinha">
        <div class="titulo">PORTIFÓLIO DO MR. COMÉDIA</div>
        <nav>
            <ul class="links">
                <li><a href="index.html">Pág. inicial</a></li>  
                <li><a href="projetos.html">Projetos</a></li>
            </ul>
        </nav>
    </header>

    <p class="bemvindo">Meus Projetos (até então): </p>
    
    <ul class="projetos">
        <li class="caixa">
            <a href="https://mrbuenoifpr.github.io/portifolio/index.html" target="_blank">
                <img src="portifolio.png" alt="portifólio" height="250" width="500">
                <div class="nome-projetos">
                    <p>Portifólio</p>
                </div>
            </a>
        </li>

        <li class="caixa">
            <a href="https://mrbuenoifpr.github.io/harry-potter/index.html" target="_blank">
                <img src="harry-potter.png" alt="harry" height="250" width="500">
                <div class="nome-projetos">
                    <p>Harry Potter</p>
                </div>
            </a>
        </li>
    </ul>
</body>

</html>
